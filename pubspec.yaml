name: stashpot
description: "Home food inventory with barcode scanning and Firebase sync"
publish_to: 'none'
version: 1.9.1+15

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  # Localization (English + Traditional Chinese)
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.6

  # Camera & image picking for photo food ID
  camera: ^0.11.1
  image_picker: ^1.1.2

  # HTTP for Open Food Facts API
  http: ^1.3.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  go_router: ^15.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  table_calendar: ^3.1.2

  # OTA self-update: download the APK and hand it to the system installer
  open_filex: ^4.5.0
  path_provider: ^2.1.5

  # Live-preview barcode scanning
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true # builds AppLocalizations from lib/l10n/*.arb

# App launcher icon (the StashPot grocery-bag logo). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#F7F8F0"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
